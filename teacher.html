<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>教师入口 - 物资编号检索系统</title>
    <link rel="stylesheet" href="骨架粗略.css">
    <style>
        /* ================= 1. 基础 ================= */
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: #000 !important;
            /* 【修复】解开全局锁定，允许小屏滚动 */
            overflow: auto; 
            font-family: 'Helvetica Neue', Arial, sans-serif;
        }

        .hero-container {
            width: 100vw; height: 100vh;
            display: flex; justify-content: center; align-items: center;
            position: relative;
            background: #111111 !important; 
        }
        .hero-container::after { display: none !important; }

        /* 【适配】统一使用 1180px * 680px 黄金比例 */
        .main-stage-teacher {
            opacity: 0; animation: pureFadeIn 1.2s ease-out forwards; 
            display: flex; align-items: stretch; gap: 24px; 
            width: 1180px; height: 680px; z-index: 10;
        }

        @keyframes pureFadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        /* ================= 2. 布局尺寸 ================= */
        .left-col { display: flex; flex-direction: column; gap: 20px; width: 560px; height: 100%; }
        .right-col { width: 600px; height: 100%; display: flex; flex-direction: column; }
        .panel-box { background-size: 100% 100%; background-repeat: no-repeat; box-sizing: border-box; position: relative; }

        /* 左上：教师入口框 */
        .box-teacher-top {
            background-image: url('images/最后/方框1.png'); 
            height: 150px; padding: 30px; 
            display: flex; flex-direction: column; justify-content: center; align-items: flex-start; margin-top: 30px;
        }
        .title-row { display: flex; align-items: center; gap: 16px; margin-bottom: 12px; }
        .img-teacher-title { height: 42px; width: auto; object-fit: contain; }
        .img-arrow { height: 30px; width: auto; transform: translateY(6px); }
        .img-teacher-en { height: 18px; width: auto; opacity: 0.8; object-fit: contain; }

        /* 左下：物资检索与录入框 */
        .box-teacher-main {
            background-image: url('images/最后/方框2.png'); flex: 1;
            padding: 36px 28px; display: flex; flex-direction: column;
            justify-content: space-between; align-items: flex-start;
        }
        
        .mgt-header { display: flex; flex-direction: column; align-items: flex-start; }
        .img-sys-title { height: 28px; width: auto; object-fit: contain; margin-bottom: 8px; }
        .img-sys-desc { height: 16px; width: auto; opacity: 0.6; object-fit: contain; }

        .action-module { width: 100%; display: flex; flex-direction: column; gap: 10px; align-items: flex-start; }
        
        /* 【适配】统一标准高度 */
        .standard-height { height: 40px !important; }

        .input-btn-row { display: flex; gap: 15px; align-items: center; width: 100%; }
        
        .white-input-bg {
            flex: 1; background-image: url('images/最后/搜索栏.png'); background-size: 100% 100%;
            display: flex; align-items: center; padding: 0 25px; box-sizing: border-box;
        }
        .white-input-bg input { width: 100%; height: 100%; background: transparent; border: none; outline: none; color: #000; font-size: 18px; font-weight: 500; }

        .btn-container-input {
            width: 100%; background-image: url('images/最后/Button Container.png'); background-size: 100% 100%;
            display: flex; align-items: center; padding: 0 25px; box-sizing: border-box;
        }
        .btn-container-input input { width: 100%; height: 100%; background: transparent; border: none; outline: none; color: #fff; font-size: 16px; }
        .btn-container-input input::placeholder { color: rgba(255,255,255,0.4); }

        .img-wait-bar { width: 100%; height: 50px; object-fit: fill; }
        .img-submit-btn { width: 100%; height: 52px; object-fit: fill; cursor: pointer; transition: transform 0.2s; }
        .img-submit-btn:hover { transform: scale(1.02); }
        .tag-img { height: 34px; width: auto; object-fit: contain; }
        .btn-img { height: 40px; width: auto; object-fit: contain; cursor: pointer; transition: transform 0.2s; }
        .btn-img:hover { transform: scale(1.05); }

        /* ================= 3. 右侧面板 ================= */
        /* 【修复】开启右侧弹性布局与局部滑轨 */
        .box-right {
            background-image: url('images/最后/方框3.png'), url('images/最后/背景.png')!important;
            background-repeat: no-repeat, no-repeat!important;
            background-position: center, right top!important;
            background-size: 100% 100%, 120% 120%!important;
            height: 650px; padding: 15px 50px;
            display: flex; flex-direction: column; margin-top: 30px; box-sizing: border-box;
        }
        .img-db-title { height: 50px; width: auto; object-fit: contain; margin-bottom: 10px; flex-shrink: 0; z-index: 2; position: relative;}

        .data-list { list-style: none; padding: 0; margin: 0; flex: 1; overflow-y: auto; padding-right: 15px; }
        .data-list::-webkit-scrollbar { width: 6px; }
        .data-list::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.3); border-radius: 4px; }
        .data-list::-webkit-scrollbar-track { background: transparent; }
        .data-item { display: flex; align-items: center; gap: 20px; padding: 15px 0; border-bottom: 1px solid rgba(255, 255, 255, 0.1); color: #fff; font-size: 18px; }
        
        .yellow-badge { 
            background-color: #98FF98; 
            color: #000; 
            font-weight: bold; 
            font-size: 14px; 
            padding: 4px 10px; 
            border-radius: 4px; 
            min-width: 35px; 
            text-align: center; 
            display: inline-block;
        }

        .dropdown-menu a { transition: all 0.2s ease-in-out !important; background: rgba(255, 255, 255, 0.15) !important; backdrop-filter: blur(10px) !important; }
        .dropdown-menu a:hover { transform: translateY(-3px) !important; background: rgba(255, 255, 255, 0.35) !important; color: #ffffff !important; text-shadow: 0 0 8px rgba(255, 255, 255, 0.8) !important; box-shadow: 0 4px 15px rgba(255, 255, 255, 0.2) !important; filter: none !important; outline: none !important; }
        .has-dropdown { perspective: 1000px; }
        #rolePill { transition: all 0.3s ease !important; }
        #rolePill:hover { transform: scale(1.05) !important; box-shadow: 0 0 25px rgba(152, 255, 152, 0.6) !important; }
    </style>
</head>

<body>
    <header class="navbar">
        <a href="#" class="nav-logo" id="dynamicHomeLogo">
            <img src="images/首页/主页面.png" alt="首页">
        </a>
        <nav class="nav-links">
            <div class="nav-item has-dropdown">
                <a href="javascript:void(0)" class="nav-img-btn" id="dropdownBtn">
                    <img src="images/首页/识别材料.png" alt="识别材料">
                </a>
                <div class="dropdown-menu" id="dropdownMenu">
                    <a href="bone骨架 连接设备.html">连接设备</a> 
                    <a href="bone骨架 测试模块.html">识别区域</a>
                </div>
            </div>
            <a href="#" class="nav-img-btn" id="navQueryBtn">
                <img src="images/首页/查询材料.png" alt="查询材料">
            </a>
            <a href="about.html" class="nav-img-btn"><img src="images/首页/关于我们.png" alt="关于我们"></a>
        </nav>
        <div class="auth-buttons">
            <div id="rolePill" class="admin-identity-pill" style="background-color: #98FF98; color: #000; padding: 10px 20px; border-radius: 30px; font-weight: 800; cursor: pointer;">hi, teacher</div>
        </div>
    </header>

    <div class="hero-container">
      <main class="main-stage-teacher">
          
        <div class="left-col">
            <div class="panel-box box-teacher-top">
                <div class="title-row">
                    <img src="images/最后/教师.png" alt="教师入口" class="img-teacher-title">
                    <img src="images/最后/箭头.png" alt="箭头" class="img-arrow">
                </div>
                <img src="images/最后/教师英文.png" alt="Teacher Login" class="img-teacher-en">
            </div>

            <div class="panel-box box-teacher-main">
                <div class="mgt-header">
                    <img src="images/最后/物资.png" alt="物资编号检索系统" class="img-sys-title">
                    <img src="images/最后/检索英文.png" alt="Material Number Retrieval System" class="img-sys-desc">
                </div>

                <div class="action-module">
                    <div class="input-btn-row standard-height">
                        <div class="white-input-bg standard-height">
                            <input type="text" id="searchInput" placeholder="在此输入编号进行搜索..." onkeypress="if (event.key === 'Enter') performSearch();">
                        </div>
                        <img src="images/最后/搜索键.png" alt="执行搜索" class="btn-img standard-height" onclick="performSearch()">
                    </div>
                    <div id="statusArea" style="width: 100%;">
                        <img src="images/最后/等待检索.png" alt="等待检索" class="img-wait-bar" id="waitImg">
                    </div>
                </div>

                <div class="action-module">
                    <img src="images/最后/录入.png" alt="录入新材料" class="tag-img">
                    <div class="btn-container-input standard-height">
                        <input type="text" id="addName" placeholder="在此输入材料名称...">
                    </div>
                    <div class="btn-container-input standard-height">
                        <input type="text" id="addDesc" placeholder="在此输入材料简介...">
                    </div>
                    <img src="images/最后/提交并.png" alt="提交并自动生成编号" class="img-submit-btn" onclick="addMaterial()">
                    <div id="addResultDisplay" style="width: 100%; font-size: 14px; margin-top: 5px;"></div>
                </div>
            </div>
        </div>

        <div class="panel-box box-right right-col">
            <img src="images/最后/系统演示.png" alt="系统演示数据库" class="img-db-title">
            <ul class="data-list" id="demoList"></ul>
        </div>
      </main>
    </div>

    <script>
      const dropdownBtn = document.getElementById('dropdownBtn');
      const dropdownMenu = document.getElementById('dropdownMenu');
      const dropdownContainer = document.querySelector('.has-dropdown');

      dropdownBtn.addEventListener('click', function(e) {
          e.preventDefault(); e.stopPropagation();
          dropdownMenu.classList.toggle('show');
          if(dropdownContainer) dropdownContainer.classList.toggle('active');
      });

      document.addEventListener('click', function(e) {
          if (dropdownContainer && !dropdownContainer.contains(e.target)) {
              dropdownMenu.classList.remove('show');
              dropdownContainer.classList.remove('active');
          }
      });

      const userRole = localStorage.getItem('userRole') || 'teacher';
      document.getElementById('rolePill').innerText = 'hi, ' + userRole;

      const homeLogo = document.getElementById('dynamicHomeLogo');
      const roleHomeMap = { 'admin': 'bone骨架（首页） 管理员页面.html', 'teacher': 'bone骨架（首页） 教师页面.html', 'student': 'bone骨架（首页） 学生页面.html' };
      if(homeLogo) homeLogo.href = roleHomeMap[userRole] || 'bone骨架（首页）.html';

      const navQueryBtn = document.getElementById('navQueryBtn');
      const roleQueryMap = { 'admin': 'Administrator.html', 'teacher': 'teacher.html', 'student': 'student.html' };
      if(navQueryBtn) navQueryBtn.href = roleQueryMap[userRole] || '#';

      const database = {
        "001": { name: "304不锈钢 (SUS304)", comp: "Cr 18-20%, Ni 8-10.5%, C ≤0.08%, Fe 余量", desc: "最常见的奥氏体不锈钢，具有良好的耐蚀性和成型性，广泛用于食品设备和一般化工设备。" },
        "002": { name: "316不锈钢 (SUS316)", comp: "Cr 16-18%, Ni 10-14%, Mo 2-3%, Fe 余量", desc: "添加了钼元素，抗氯离子点蚀能力强，常用于海洋环境、化工及医疗器械。" },
        "003": { name: "6061铝合金 (Al-Mg-Si系)", comp: "Mg 0.8-1.2%, Si 0.4-0.8%, Cu 0.15-0.4%, Al 余量", desc: "具有良好的可塑性和优良的焊接性，广泛应用于自动化机械零件、精密加工等。" },
        "004": { name: "7075铝合金 (Al-Zn-Mg-Cu系)", comp: "Zn 5.1-6.1%, Mg 2.1-2.9%, Cu 1.2-2.0%, Al 余量", desc: "超硬铝合金，强度极高，常用于航空航天工业及高应力结构件。" },
        "005": { name: "TC4钛合金 (Ti-6Al-4V)", comp: "Al 5.5-6.75%, V 3.5-4.5%, Ti 余量", desc: "综合力学性能优异，比强度高，广泛用于航空发动机叶片、医疗植入物等。" },
        "006": { name: "H62普通黄铜 (Cu-Zn合金)", comp: "Cu 60.5-63.5%, Zn 余量", desc: "具有良好的力学性能，热态下塑性好，常用于制造各种深拉伸和弯曲制造的受力零件。" },
        "007": { name: "QBe2铍青铜 (Cu-Be合金)", comp: "Be 1.8-2.1%, Ni+Co ≥0.2%, Cu 余量", desc: "极高的强度、硬度、弹性极限和疲劳极限，常用于精密弹簧、电接触元件。" },
        "008": { name: "Inconel 718 镍基高温合金", comp: "Ni 50-55%, Cr 17-21%, Nb 4.75-5.5%, Fe 余量", desc: "在-253~700℃温度范围内具有良好的综合性能，用于航空发动机涡轮盘等。" },
        "009": { name: "AZ31B变形镁合金", comp: "Al 2.5-3.5%, Zn 0.6-1.4%, Mn 0.2-1.0%, Mg 余量", desc: "比强度高、减震性好，广泛应用于汽车、电子产品的轻量化壳体。" },
        "010": { name: "Q235普通碳素结构钢", comp: "C 0.12-0.20%, Mn 0.30-0.67%, Si ≤0.30%, Fe 余量", desc: "含碳量适中，综合性能较好，强度、塑性和焊接等性能得到较好配合，建筑常用。" }
      };

      function refreshList() {
        const listElement = document.getElementById("demoList");
        listElement.innerHTML = "";
        Object.keys(database).sort().forEach(code => {
          let li = document.createElement("li");
          li.className = "data-item";
          li.innerHTML = `<span class="yellow-badge">${code}</span> ${database[code].name}`;
          listElement.appendChild(li);
        });
        
        // 自动滚动到底部 (方便看到新录入的数据)
        if (listElement) listElement.scrollTop = listElement.scrollHeight;
      }

      window.onload = refreshList;

      function performSearch() {
        const query = document.getElementById("searchInput").value.trim();
        const statusArea = document.getElementById("statusArea");
        
        if (query === "") {
            statusArea.innerHTML = `
            <div style="padding: 10px; color:#f7e018; background: rgba(247, 224, 24, 0.1); border: 1px solid #f7e018; border-radius: 4px;">
                ⚠️ 请输入需要检索的物资编号
            </div>`;
            return;
        }

        const item = database[query];
        if(item) {
            statusArea.innerHTML = `
            <div style="padding: 12px; border: 1px dashed #00e676; border-radius: 8px; background: rgba(0, 230, 118, 0.1);">
                <div style="color:#00e676; font-weight:bold; margin-bottom: 4px; font-size: 16px;">✅ 检索成功：${item.name}</div>
                <div style="color:#fff; font-size: 14px; margin-bottom: 4px;">🧪 <strong>成分：</strong>${item.comp}</div>
                <div style="color:rgba(255,255,255,0.7); font-size: 13px;">📝 <strong>简介：</strong>${item.desc}</div>
            </div>`;
        } else {
            statusArea.innerHTML = `
            <div style="padding: 12px; border: 1px dashed #ff4757; border-radius: 8px; background: rgba(255, 71, 87, 0.1);">
                <span style="color:#ff4757; font-weight: bold;">❌ 未找到编号为 [${query}] 的物资</span>
            </div>`;
        }
      }

      function addMaterial() {
        const nameInput = document.getElementById("addName");
        const descInput = document.getElementById("addDesc");
        const addResultDisplay = document.getElementById("addResultDisplay");
        
        const name = nameInput.value.trim();
        const desc = descInput.value.trim();

        if(!name) { 
            addResultDisplay.innerHTML = '<span style="color:#ff4757; background: rgba(255, 71, 87, 0.1); padding: 5px 10px; border-radius: 4px;">⚠️ 失败：名称不能为空！</span>';
            setTimeout(() => { addResultDisplay.innerHTML = ""; }, 3000);
            return; 
        }

        const codes = Object.keys(database).sort();
        const nextNum = parseInt(codes[codes.length - 1]) + 1;
        const newCode = String(nextNum).padStart(3, '0');

        database[newCode] = { name: name, comp: "手动录入，暂无成分数据", desc: desc || "无" };
        refreshList();

        nameInput.value = ""; descInput.value = "";
        addResultDisplay.innerHTML = `<span style="color:#00e676; background: rgba(0, 230, 118, 0.1); padding: 5px 10px; border-radius: 4px;">✅ 录入成功！分配编号：[${newCode}]</span>`;
        
        setTimeout(() => { addResultDisplay.innerHTML = ""; }, 3000);
      }
    </script>
</body>
</html>
