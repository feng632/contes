<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>连接设备 - 细节优化版</title>
    <link rel="stylesheet" href="骨架粗略.css">
    <style>
        /* 1. 基础环境：强制纯黑 */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000 !important;
            overflow: hidden;
            font-family: "Microsoft YaHei", sans-serif;
        }

        /* ================= 新增：入场动画容器 ================= */
        .fade-in-wrapper {
            opacity: 0;
            animation: pureFadeIn 1.2s ease-out forwards;
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            pointer-events: none;
        }
        
        /* 恢复容器内子元素的交互，让卡片悬停依旧生效 */
        .fade-in-wrapper > * {
            pointer-events: auto; 
        }

        @keyframes pureFadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        /* ====================================================== */

        /* 背景绿光弧线  */
        .horizon-glow {
            position: absolute;
            top: 70%; 
            left: 50%;
            transform: translate(-50%, -50%);
            width: 100vw;
            z-index: 1;
            pointer-events: none;
        }
        .horizon-glow img { 
            width: 100%; 
            opacity: 1; 
            filter: brightness(1.2) contrast(1.1); 
        }

        /* 2. 顶部标题：连接设备.png */
        .header-title {
            position: absolute;
            top: 90px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
        }
        /* 2. 顶部标题：连接设备.png */
        .header-title {
            position: absolute;
            top: 90px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
        }
        
        /* 替换掉原来的 .header-title img，并增加以下悬停特效代码 */
        .header-title img { 
            height: 55px; 
            cursor: pointer; /* 鼠标放上去变小手 */
            transition: transform 0.3s cubic-bezier(0.165, 0.84, 0.44, 1), filter 0.3s ease; /* 平滑的物理惯性过渡 */
        }

        /* 鼠标悬停时的浮动与发光效果 */
        .header-title img:hover {
            transform: translateY(-6px) scale(1.03); /* 向上浮动并微微放大 */
            filter: drop-shadow(0 10px 20px rgba(0, 255, 180, 0.4)); /* 增加与背景呼应的绿色发光阴影 */
        }

        /* 3. 主体布局 */
        .main-stage {
            position: absolute;
            top: 61%; 
            left: 50%;
            transform: translate(-50%, -50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 5;
            width: 100%;
        }

        /* 4. 三卡片错落区 */
        .cards-row {
            display: flex;
            align-items: flex-end;
            gap: 50px; 
            margin-bottom: 60px;
        }

        /* 5. 卡片通用样式 */
        .device-card {
            position: relative;
            width: 360px; 
            height: 420px; 
            border-radius: 30px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding: 35px;
            box-sizing: border-box;
            transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
            cursor: pointer;
        }

        /* 鼠标悬停微动效果 */
        .device-card:hover {
            transform: translateY(-10px) scale(1.02);
            box-shadow: 0 15px 40px rgba(0, 255, 180, 0.15); /* 淡淡的绿光阴影 */
        }

        /* 中间卡片：错落高度 */
        .center-card {
            height: 490px; 
            margin-bottom: 40px; 
        }

        /* --- 样式细调 --- */
        /* 左侧：使用实景图背景，并加持一层强力遮罩挡住原图的字 */
        .card-photo {
            background-image: 
                /* 这一层是人造的黑色渐变遮罩，从底部向上覆盖，专门用来挡住原图的字 */
                linear-gradient(to top, rgba(20, 20, 20, 1) 0%, rgba(20, 20, 20, 0.95) 25%, transparent 55%),
                /* 下面这一层才是你原本带字的图片 */
                url('./device/XRF.webp');
            background-size: cover;
            background-position: center;
        }

        /* 右边两个大框：修正渐变色值 */
        .card-gradient {
            background: linear-gradient(180deg, #999999 0%, #1a1a1a 100%);
            border: 1px solid rgba(255, 255, 255, 0.15);
        }

        /* 卡片2：中间的网关设备图片 */
        .card-photo-2 {
            background-image: 
                linear-gradient(to top, rgba(20, 20, 20, 1) 0%, rgba(20, 20, 20, 0.95) 25%, transparent 55%),
                url('./device/RS485.jpg'); /* 🌟 在这里填入第二张图片的路径 */
            background-size: cover;
            background-position: center;
            border: 1px solid rgba(255, 255, 255, 0.15);
        }

        /* 卡片3：右侧的定位仪设备图片 */
        .card-photo-3 {
            background-image: 
                linear-gradient(to top, rgba(20, 20, 20, 1) 0%, rgba(20, 20, 20, 0.95) 25%, transparent 55%),
                url('./device/api.png'); /* 🌟 在这里填入第三张图片的路径 */
            background-size: cover;
            background-position: center;
            border: 1px solid rgba(255, 255, 255, 0.15);
        }

        /* ================= 纯文本设备标签样式 (替代原本的图片) ================= */
        .device-label {
            z-index: 6;
            margin-bottom: 5px;
            display: flex;
            flex-direction: column;
            gap: 6px;
            text-align: left;
        }
        
        .device-name {
            color: #fff;
            font-size: 26px; /* 大号加粗中文 */
            font-weight: 900; 
            letter-spacing: 1.5px;
            text-shadow: 0 2px 8px rgba(0,0,0,0.6); /* 增加文字阴影，防止背景太亮看不清 */
        }
        
        .device-en {
            color: rgba(255, 255, 255, 0.6); /* 半透明灰色英文 */
            font-size: 13px;
            font-family: Arial, Helvetica, sans-serif;
            letter-spacing: 0.5px;
            text-transform: lowercase; /* 强制英文小写，更有 UI 设计感 */
        }

       /* ================= 7. 智能设备连接按钮 ================= */
        .connect-btn {
            position: absolute;
            top: 25px;
            right: 25px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: #fff;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: bold;
            cursor: pointer;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s ease;
            z-index: 20; /* 确保在最上层 */
        }

        .connect-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(255, 255, 255, 0.1);
        }

        /* 状态1：正在连接 (转圈动画 + 黄色预警色) */
        .connect-btn.connecting {
            color: #f7e018; 
            border-color: #f7e018;
            background: rgba(247, 224, 24, 0.1);
            pointer-events: none; /* 正在连接时禁止重复点击 */
        }
        .connect-btn.connecting .icon-spin {
            animation: spin 1s linear infinite; /* 触发转圈动画 */
        }

        /* 状态2：已连接 (对号 + 绿色安全色) */
        .connect-btn.connected {
            background: rgba(0, 230, 118, 0.15);
            color: #00e676; 
            border-color: #00e676;
            box-shadow: 0 0 15px rgba(0, 230, 118, 0.3);
            pointer-events: none; /* 连上后禁止再点 */
        }

        /* 定义无限旋转的物理动画 */
        @keyframes spin {
            100% { transform: rotate(360deg); }
        }

        /* 6. 底部长条按钮 */
        .footer-action img {
            width: 1050px;
            max-width: 95vw;
            cursor: pointer;
            transition: transform 0.3s ease;
        }
        .footer-action img:hover {
            transform: scale(1.01);
        }

        /* ================ 导航栏胶囊浮动增强 (局部覆盖) ================ */
       .dropdown-menu a {
            transition: all 0.2s ease-in-out !important;
            background: rgba(255, 255, 255, 0.15) !important;
            backdrop-filter: blur(10px) !important;
            
        }
       .dropdown-menu a:hover {
            transform: translateY(-3px) !important; /* 微微上浮，手感更好 */
            background: rgba(255, 255, 255, 0.35) !important; /* 背景变成更亮的半透明白色 */
            color: #ffffff !important; /* 确保文字是纯白 */
            text-shadow: 0 0 8px rgba(255, 255, 255, 0.8) !important; /* 让文字本身发出柔和的白光 */
            box-shadow: 0 4px 15px rgba(255, 255, 255, 0.2) !important; /* 整个胶囊边缘泛起淡淡的白晕 */
            filter: none !important;
            outline: none !important;
        }
        .has-dropdown {
            perspective: 1000px; 
        }


        /* ================= 8. 搜寻设备弹窗特效 ================= */
        .search-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.7); /* 黑色半透明遮罩 */
            backdrop-filter: blur(6px); /* 背景模糊 */
            -webkit-backdrop-filter: blur(6px);
            z-index: 9999;
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none; /* 默认隐藏并禁止点击 */
            transition: opacity 0.3s ease;
        }

        /* 激活状态 */
        .search-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        /* 弹窗本体 (毛玻璃质感) */
        .search-modal {
            background: rgba(20, 20, 20, 0.85);
            border: 1px solid rgba(0, 230, 118, 0.3);
            box-shadow: 0 10px 40px rgba(0, 230, 118, 0.2);
            border-radius: 20px;
            padding: 50px 80px;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            transform: scale(0.9);
            transition: transform 0.3s cubic-bezier(0.165, 0.84, 0.44, 1);
        }
        .search-overlay.active .search-modal { transform: scale(1); }

        /* 关闭按钮 */
        .close-search-btn {
            position: absolute;
            top: 15px; right: 20px;
            color: rgba(255, 255, 255, 0.4);
            font-size: 28px;
            cursor: pointer;
            transition: color 0.2s;
        }
        .close-search-btn:hover { color: #ff4757; } /* 悬停变红 */

        /* 科技感发光扫描环 */
        .tech-scanner {
            width: 70px; height: 70px;
            border: 4px solid rgba(0, 230, 118, 0.1); /* 暗色底环 */
            border-top: 4px solid #00e676; /* 高亮扫描头 */
            border-radius: 50%;
            animation: scanSpin 1.2s linear infinite; /* 无限旋转 */
            margin-bottom: 30px;
            box-shadow: 0 0 20px rgba(0, 230, 118, 0.4);
        }
        @keyframes scanSpin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* 文案排版 */
        .search-title { color: #fff; font-size: 20px; font-weight: bold; letter-spacing: 2px; margin-bottom: 8px; }
        .search-subtitle { color: #00e676; font-size: 14px; opacity: 0.8; letter-spacing: 1px; font-family: monospace; }
    </style>
</head>
<body>
    <header class="navbar">
        <a href="#" class="nav-logo" id="dynamicHomeLogo">
            <img src="images/首页/主页面.png" alt="首页">
        </a>
        <nav class="nav-links">
            <div class="nav-item has-dropdown">
                <a href="javascript:void(0)" class="nav-img-btn" id="dropdownBtn">
                    <img src="images/首页/识别材料.png" alt="识别材料">
                </a>
                <div class="dropdown-menu" id="dropdownMenu">
                    <a href="bone骨架 连接设备.html">连接设备</a> 
                    <a href="bone骨架 测试模块.html">识别区域</a>
                </div>
            </div>
            <a href="#" class="nav-img-btn" id="navQueryBtn">
                <img src="images/首页/查询材料.png" alt="查询材料">
            </a>
            <a href="about.html" class="nav-img-btn"><img src="images/首页/关于我们.png" alt="关于我们"></a>
        </nav>
        <div class="auth-buttons">
            <div id="rolePill" style="background-color: #98FF98; color: #000; padding: 10px 20px; border-radius: 30px; font-weight: 800; cursor: pointer;">hi, user</div>
        </div>
    </header>

    <!-- 用 fade-in-wrapper 包裹主体内容，巧妙避开定位冲突 -->
    <div class="fade-in-wrapper">
        <div class="horizon-glow">
            <img src="images/连接设备/背景3.png" alt="光晕">
        </div>

        <!-- <div class="header-title">
            <img src="images/连接设备/连接设备.png" alt="连接设备">
        </div> -->

        <main class="main-stage">
            <div class="cards-row">
                
                <div class="device-card card-photo">
                    <button class="connect-btn" onclick="connectDevice(this)">
                        <svg class="icon-spin" viewBox="0 0 24 24" width="14" height="14" stroke="currentColor" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M21 12a9 9 0 1 1-6.219-8.56" class="svg-path"></path>
                        </svg>
                        <span class="btn-text">点击连接</span>
                    </button>
                    
                    <div class="device-label">
                        <div class="device-name">台式 X 射线荧光光谱仪</div>
                        <div class="device-en">benchtop xrf spectrometer</div>
                    </div>
                </div>

                <div class="device-card card-photo-2 center-card">
                    <button class="connect-btn" onclick="connectDevice(this)">
                        <svg class="icon-spin" viewBox="0 0 24 24" width="14" height="14" stroke="currentColor" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M21 12a9 9 0 1 1-6.219-8.56" class="svg-path"></path>
                        </svg>
                        <span class="btn-text">点击连接</span>
                    </button>
                    
                    <div class="device-label">
                        <div class="device-name">RS485 数据采集网关</div>
                        <div class="device-en">rs485 data acquisition gateway</div>
                    </div>
                </div>

                <div class="device-card card-photo-3">
                    <button class="connect-btn" onclick="connectDevice(this)">
                        <svg class="icon-spin" viewBox="0 0 24 24" width="14" height="14" stroke="currentColor" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M21 12a9 9 0 1 1-6.219-8.56" class="svg-path"></path>
                        </svg>
                        <span class="btn-text">点击连接</span>
                    </button>

                    <div class="device-label">
                        <div class="device-name">API 激光空间定位仪</div>
                        <div class="device-en">api laser spatial tracker</div>
                    </div>
                    
                    </div>
                
            </div>

            <div class="footer-action" onclick="openSearchModal()">
                <img src="images/连接设备/添加其他设备.png" alt="添加设备">
            </div>
        </main>
    </div>

    <div class="search-overlay" id="searchOverlay">
        <div class="search-modal">
            <div class="close-search-btn" onclick="closeSearchModal()">×</div>
            
            <div class="tech-scanner"></div>
            
            <div class="search-title">正在扫描局域网与串口...</div>
            <div class="search-subtitle">Scanning for available devices_</div>
        </div>
    </div>

    <!-- ================= 新增：缺失的 JavaScript 逻辑 ================= -->
    <script>
    // 1. 获取当前登录身份 (Admin/Teacher/Student)
    const userRole = localStorage.getItem('userRole') || 'guest';
    
    // 2. 更新右上角身份显示
    const rolePill = document.getElementById('rolePill');
    if(rolePill) rolePill.innerText = 'hi, ' + userRole;

    // 3. 定义不同身份对应的“查询材料”页面
    const roleQueryMap = {
        'admin': 'Administrator.html',
        'teacher': 'teacher.html',
        'student': 'student.html'
    };

    // 4. 定义不同身份对应的“首页”
    const roleHomeMap = {
        'admin': 'bone骨架（首页） 管理员页面.html',
        'teacher': 'bone骨架（首页） 教师页面.html',
        'student': 'bone骨架（首页） 学生页面.html'
    };

    // 5. 【核心修复】：动态绑定导航栏跳转链接
    const navQueryBtn = document.getElementById('navQueryBtn');
    if(navQueryBtn) {
        // 根据当前身份从映射表中取对应的文件名，如果没有匹配则保持 #
        navQueryBtn.href = roleQueryMap[userRole] || '#';
    }

    const homeLogo = document.getElementById('dynamicHomeLogo');
    if(homeLogo) {
        homeLogo.href = roleHomeMap[userRole] || 'index.html';
    }

    // 6. 下拉菜单控制逻辑 (保持原样)
    const dropdownBtn = document.getElementById('dropdownBtn');
    const dropdownMenu = document.getElementById('dropdownMenu');
    if(dropdownBtn && dropdownMenu) {
        dropdownBtn.onclick = (e) => {
            e.preventDefault();
            e.stopPropagation();
            dropdownMenu.classList.toggle('show');
        };
    }
    document.onclick = () => { if(dropdownMenu) dropdownMenu.classList.remove('show'); };


    // ================= 7. 智能设备连接握手逻辑 =================
    function connectDevice(btn) {
        // 1. 进入“正在连接”状态
        btn.classList.add('connecting');
        btn.querySelector('.btn-text').innerText = '正在请求...';
        
        // 确保使用经典的缺口圆环作为 loading 图标
        const path = btn.querySelector('.svg-path');
        path.outerHTML = `<path d="M21 12a9 9 0 1 1-6.219-8.56" class="svg-path"></path>`;

        // 2. 模拟网络请求延迟 (随机 1.5秒 到 2.5秒)
        const delay = Math.random() * 1000 + 1500;
        
        setTimeout(() => {
            // 3. 请求完成，进入“已连接”状态
            btn.classList.remove('connecting');
            btn.classList.add('connected');
            btn.querySelector('.btn-text').innerText = '已连接';
            
            // 停止转圈，将图标替换为“绿色对号”
            const icon = btn.querySelector('.icon-spin');
            icon.style.animation = 'none';
            icon.innerHTML = `<polyline points="20 6 9 17 4 12" class="svg-path"></polyline>`;
            
        }, delay);
    }

    // ================= 8. 搜寻设备伪装弹窗逻辑 =================
    const searchOverlay = document.getElementById('searchOverlay');

    function openSearchModal() {
        searchOverlay.classList.add('active');
    }

    function closeSearchModal() {
        searchOverlay.classList.remove('active');
    }

    // 点击弹窗黑色背景空白处，也能关闭弹窗
    searchOverlay.addEventListener('click', function(e) {
        if (e.target === searchOverlay) {
            closeSearchModal();
        }
    });



    






</script>

</body>
</html>
