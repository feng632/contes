<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>学生端主页 - 多光谱材料识别数据管理系统</title>
    <!-- 引用骨架CSS获取基础布局 -->
    <link rel="stylesheet" href="骨架粗略.css">
    <style>
        /* ================= 1. 背景质感 ================= */
        .hero-container {
            width: 100%;
            min-height: 100vh;
            background: 
                radial-gradient(circle at 20% 80%, rgba(0,255,180,0.3), transparent 40%),
                radial-gradient(circle at 80% 20%, rgba(0,255,180,0.25), transparent 40%),
                url('images/首页/背景光效1.png');
            background-size: cover;
            background-position: center top; 
            background-color: #000;
            position: relative;
            overflow: hidden;
        }

        /* ================= 2. 标题尺寸 ================= */
        .main-content2 {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            pointer-events: none;
            z-index: 5;
        }

        .title-img {
            width: 600px; 
            height: auto;
            display: block;
            opacity: 0;
            animation: pureFadeIn 1.2s ease-out forwards;
        }

        /* ================= 3. 右上角身份按钮 ================= */
        .student-identity-pill {
            background-color: #98FF98 !important; 
            color: #000 !important;
            border: none;
            padding: clamp(8px, 1vw, 12px) clamp(20px, 2vw, 35px);
            border-radius: 30px;
            font-size: clamp(14px, 1.1vw, 17px);
            font-weight: 800; 
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(152, 255, 152, 0.4);
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
            white-space: nowrap;
        }

        .student-identity-pill:hover {
            transform: scale(1.05);
            box-shadow: 0 0 25px rgba(152, 255, 152, 0.6);
        }

        .dropdown-menu {
            z-index: 1001 !important;
        }

        @keyframes pureFadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ================ 导航栏胶囊浮动增强 (局部覆盖) ================ */
       .dropdown-menu a {
            transition: all 0.2s ease-in-out !important;
            background: rgba(255, 255, 255, 0.15) !important;
            backdrop-filter: blur(10px) !important;
            
        }
       .dropdown-menu a:hover {
            transform: translateY(-3px) !important; /* 微微上浮，手感更好 */
            background: rgba(255, 255, 255, 0.35) !important; /* 背景变成更亮的半透明白色 */
            color: #ffffff !important; /* 确保文字是纯白 */
            text-shadow: 0 0 8px rgba(255, 255, 255, 0.8) !important; /* 让文字本身发出柔和的白光 */
            box-shadow: 0 4px 15px rgba(255, 255, 255, 0.2) !important; /* 整个胶囊边缘泛起淡淡的白晕 */
            filter: none !important;
            outline: none !important;
        }
        .has-dropdown {
            perspective: 1000px; 
        }
    </style>
</head>
<body>

<div class="hero-container">
  <header class="navbar">
    <a href="bone骨架（首页） 学生页面.html" class="nav-logo">
        <img src="images/首页/主页面.png" alt="首页">
    </a>
    
    <nav class="nav-links">
      <div class="nav-item has-dropdown">
        <a href="javascript:void(0)" class="nav-img-btn" id="dropdownBtn">
          <img src="images/首页/识别材料.png" alt="识别材料">
        </a>
        <div class="dropdown-menu" id="dropdownMenu">
          <a href="bone骨架 连接设备.html">连接设备</a> 
          <a href="bone骨架 测试模块.html">识别区域</a>
        </div>
      </div>
      
      <a href="student.html" class="nav-img-btn">
        <img src="images/首页/查询材料.png" alt="查询材料">
    </a>
      
      <a href="about.html" class="nav-img-btn">
        <img src="images/首页/关于我们.png" alt="关于我们">
      </a>
    </nav>

    <div class="auth-buttons">
      <div class="student-identity-pill">hi, student</div>
    </div>
  </header>

  <main class="main-content2">
    <img src="images/首页/标题.png" alt="多光谱材料识别数据管理系统" class="title-img">
  </main>
</div>

<script>
    // 下拉菜单控制逻辑
    const dropdownBtn = document.getElementById('dropdownBtn');
    const dropdownMenu = document.getElementById('dropdownMenu');
    const dropdownContainer = document.querySelector('.has-dropdown');

    dropdownBtn.addEventListener('click', function(e) {
        e.preventDefault();
        e.stopPropagation();
        dropdownMenu.classList.toggle('show');
        dropdownContainer.classList.toggle('active');
    });

    document.addEventListener('click', function(e) {
        if (!dropdownContainer.contains(e.target)) {
            dropdownMenu.classList.remove('show');
            dropdownContainer.classList.remove('active');
        }
    });

    // 身份点击注销提示
    document.querySelector('.student-identity-pill').addEventListener('click', function() {
        if(confirm("确定要注销学生登录吗？")) {
            window.location.href = 'index.html'; // 改为你真正的公共首页文件名
        }
    });

    // ================= 【新增】智能路由跳转逻辑 =================
    const currentUserRole = localStorage.getItem('userRole') || 'guest';

    // 1. 主页面 Logo 智能跳转
    const homeLogo = document.getElementById('dynamicHomeLogo');
    const roleHomeMap = {
        'admin': 'bone骨架（首页） 管理员页面.html',
        'teacher': 'bone骨架（首页） 教师页面.html',
        'student': 'bone骨架（首页） 学生页面.html'
    };
    if (homeLogo) {
        homeLogo.href = roleHomeMap[currentUserRole] || 'index.html';
    }

    // 2. 查询材料 智能跳转
    const navQueryBtn = document.getElementById('navQueryBtn');
    const roleQueryMap = {
        'admin': 'Administrator.html',
        'teacher': 'teacher.html',
        'student': 'student.html'
    };
    if (navQueryBtn) {
        navQueryBtn.href = roleQueryMap[currentUserRole] || '#';
    }
</script>

</body>
</html>
